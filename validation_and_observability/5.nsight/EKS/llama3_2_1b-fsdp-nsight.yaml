#
# Reference PyTorchJob manifest: Llama 3.2 1B FSDP with Nsight Systems profiling.
# Tested on 2x g5.8xlarge (1 GPU each, no EFA). Adjust replicas, GPU count,
# image, and EFA settings for your cluster.
#
# Before applying, replace placeholders marked with <...>:
#   - <ACCOUNT_ID>, <REGION>, <IMAGE_TAG>: your ECR image URI
# Also adjust replicas, GPU count, and EFA settings as needed.
apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: llama3-2-1b-fsdp-nsight
spec:
  elasticPolicy:
    rdzvBackend: c10d
    minReplicas: 1
    maxReplicas: 64
    maxRestarts: 0  # No restarts for profiling jobs
  pytorchReplicaSpecs:
    Worker:
      replicas: 2  # Number of nodes
      restartPolicy: Never
      template:
        metadata:
          labels:
            app: llama3-2-1b-fsdp-nsight
        spec:
          volumes:
            - name: shmem
              hostPath:
                path: /dev/shm
            - name: local
              hostPath:
                path: /mnt/k8s-disks/0
            - name: nsight
              hostPath:
                path: /opt/nvidia/nsight-systems
                type: Directory
            - name: scripts
              configMap:
                name: nsight-scripts
                defaultMode: 0755
          #nodeSelector:
          #  node.kubernetes.io/instance-type: "ml.g5.8xlarge"
          #  sagemaker.amazonaws.com/compute-type: hyperpod  # For HyperPod EKS
          containers:
            - name: pytorch
              image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/fsdp:<IMAGE_TAG>  # Replace with your image
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: 1  # GPUs per node (e.g. 8 for p4de/p5)
                  #vpc.amazonaws.com/efa: 0  # EFA interfaces (e.g. 4 for p4de, 32 for p5)
                limits:
                  nvidia.com/gpu: 1
                  #vpc.amazonaws.com/efa: 0
              env:
              # --- NCCL ---
              - name: NCCL_DEBUG
                value: "INFO"
              - name: NCCL_SOCKET_IFNAME
                value: "^docker,lo,veth"
              - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                value: "1"
              - name: TORCH_NCCL_ENABLE_MONITORING
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:True"
              # --- EFA (uncomment for P4/P5 with EFA + OFI-NCCL) ---
              # The NCCL tuner plugin auto-selects optimal NCCL_PROTO and NCCL_ALGO
              # for your instance type, so avoid setting those manually.
              #- name: FI_PROVIDER
              #  value: "efa"
              #- name: NCCL_BUFFSIZE
              #  value: "8388608"
              #- name: NCCL_P2P_NET_CHUNKSIZE
              #  value: "2097152"
              #- name: NCCL_TUNER_PLUGIN
              #  value: "/opt/amazon/ofi-nccl/lib/libnccl-ofi-tuner.so"
              # --- Nsight Profiler Config ---
              # See nsys-profile.sh for full documentation of these variables.
              - name: NSYS_DELAY
                value: "30"
              - name: NSYS_DURATION
                value: "120"
              - name: NSYS_OUTPUT_DIR
                value: "/local/nsight-reports"
              - name: NSYS_RANKS_TO_PROFILE
                value: "0"
              - name: NSYS_PYTORCH_MODE
                value: "autograd-shapes-nvtx"
              - name: NSYS_PYTHON_SAMPLE
                value: "true"
              # GPU metrics: set to "all" for A100/H100/H200. "none" for g5 (A10G).
              - name: NSYS_GPU_METRICS
                value: "none"
              - name: NSYS_CUDA_MEMORY
                value: "true"
              - name: NSYS_SAMPLE
                value: "none"
              - name: NSYS_TRACE
                value: "cuda,nvtx,osrt"
              # --- HuggingFace (optional, for gated models/tokenizers) ---
              #- name: HF_TOKEN
              #  value: "hf_..."
              command:
                - /bin/bash
                - /scripts/nsys-profile.sh
                - --
                # NOTE: torchrun path depends on container image.
                # Common paths: /usr/local/bin/torchrun, /opt/conda/bin/torchrun
                - /usr/local/bin/torchrun
                - --nproc_per_node=1
                - --nnodes=2
                - /fsdp/train.py
                - --max_context_width=2048
                - --num_key_value_heads=2
                - --intermediate_size=8192
                - --hidden_width=2048
                - --num_layers=16
                - --num_heads=32
                - --model_type=llama_v3
                - --tokenizer=hf-internal-testing/llama-tokenizer
                - --checkpoint_freq=999
                - --validation_freq=999
                - --max_steps=50
                - --checkpoint_dir=/local/checkpoints
                - --dataset=allenai/c4
                - --dataset_config_name=en
                - --train_batch_size=2
                - --val_batch_size=1
                - --sharding_strategy=full
                - --offload_activations=1
                - --bf16=1
                - --lr=0.0001
                - --logging_freq=1
              volumeMounts:
                - name: shmem
                  mountPath: /dev/shm
                - name: local
                  mountPath: /local
                - name: nsight
                  mountPath: /nsight
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
