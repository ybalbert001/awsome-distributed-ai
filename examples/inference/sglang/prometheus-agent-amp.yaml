#
# Prometheus Agent -> Amazon Managed Prometheus (AMP)
#
# An in-cluster Prometheus running in agent mode (--enable-feature=agent, 2h
# local retention). It scrapes every pod labeled sglang-metrics=true or
# dcgm-metrics=true and remote-writes the samples to AMP via SigV4. This is the
# only in-cluster monitoring piece you need when Prometheus and Grafana are both
# AWS-managed (AMP + Amazon Managed Grafana) — there is no in-cluster Grafana.
#
#   kubectl apply -f prometheus-agent-amp.yaml
#
# Prerequisites (one-time):
#  1. Make sure the EKS cluster has an OIDC provider enabled:
#     eksctl utils associate-iam-oidc-provider --cluster <CLUSTER_NAME> --approve
#
#  2. Create the IAM role (amp-iamproxy-ingest-role) and bind it to the
#     ServiceAccount:
#     eksctl create iamserviceaccount \
#       --name amp-iamproxy-ingest-service-account \
#       --namespace default \
#       --cluster <CLUSTER_NAME> \
#       --attach-policy-arn arn:aws:iam::aws:policy/AmazonPrometheusRemoteWriteAccess \
#       --approve \
#       --override-existing-serviceaccounts
#
#     Or, if you already created amp-iamproxy-ingest-role manually, make sure its
#     trust policy includes this EKS cluster's OIDC provider.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amp-iamproxy-ingest-service-account
  annotations:
    eks.amazonaws.com/role-arn: "<YOUR_AMP_INGEST_ROLE_ARN>"   # arn:aws:iam::<account>:role/<amp-ingest-role>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-agent
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "endpoints", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-agent
subjects:
- kind: ServiceAccount
  name: amp-iamproxy-ingest-service-account
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 30s

    scrape_configs:
      - job_name: sglang
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # only scrape pods annotated prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # only scrape pods labeled sglang-metrics=true
          - source_labels: [__meta_kubernetes_pod_label_sglang_metrics]
            action: keep
            regex: "true"
          # build the scrape address from the port annotation
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: ${1}:${2}
          # use the metrics path from the annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # add useful labels
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # keep the role label (prefill/decode)
          - source_labels: [__meta_kubernetes_pod_label_role]
            target_label: role

      - job_name: dcgm-exporter
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # only scrape pods labeled dcgm-metrics=true
          - source_labels: [__meta_kubernetes_pod_label_dcgm_metrics]
            action: keep
            regex: "true"
          # build the scrape address from the port annotation
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: ${1}:${2}
          # use the metrics path from the annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # add useful labels
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

    remote_write:
      - url: https://aps-workspaces.<region>.amazonaws.com/workspaces/<YOUR_AMP_WORKSPACE_ID>/api/v1/remote_write
        sigv4:
          region: <region>
        queue_config:
          max_samples_per_send: 1000
          max_shards: 200
          capacity: 2500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  labels:
    app: prometheus-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-agent
  template:
    metadata:
      labels:
        app: prometheus-agent
    spec:
      serviceAccountName: amp-iamproxy-ingest-service-account
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=2h'
          - '--enable-feature=agent'
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-agent-config
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-agent
spec:
  selector:
    app: prometheus-agent
  ports:
  - name: http
    port: 9090
    targetPort: 9090
  type: ClusterIP
