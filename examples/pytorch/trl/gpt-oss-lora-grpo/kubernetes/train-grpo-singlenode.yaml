apiVersion: v1
kind: Pod
metadata:
  name: grpo-single
  labels:
    app: grpo-single
spec:
  restartPolicy: OnFailure
  containers:
    - name: pytorch
      image: ${REGISTRY}${IMAGE}:${TAG} 
      imagePullPolicy: Always
      resources:
        requests:
          nvidia.com/gpu: 4
          memory: "180Gi"
        limits:
          nvidia.com/gpu: 4
          memory: "180Gi"
      env:
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: "expandable_segments:True,garbage_collection_threshold:0.6"
      - name: HF_TOKEN
        value: $HF_TOKEN
      - name: HF_HOME
        value: "/fsx/hf_cache"
      - name: CUDA_VISIBLE_DEVICES
        value: "0,1,2,3"
      command:
        - "/bin/bash"
        - "-c"
        - |
          python /app/grpo_singlenode.py \
            --model_name_or_path openai/gpt-oss-20b \
            --peft_checkpoint /fsx/checkpoints/converted-peft/lora-checkpoint-1000-peft \
            --output_dir /fsx/checkpoints/grpo-singlenode \
            --num_generations 8 \
            --num_epochs 10 \
            --learning_rate 1e-6 \
            --per_device_train_batch_size 1 \
            --gradient_accumulation_steps 8 \
            --eval_size 20
      volumeMounts:
        - name: shmem
          mountPath: /dev/shm
        - name: fsx-storage
          mountPath: /fsx
  volumes:
    - name: shmem
      hostPath:
        path: /dev/shm
    - name: fsx-storage
      persistentVolumeClaim:
        claimName: fsx-claim
