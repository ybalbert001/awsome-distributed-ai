#
# V-JEPA 2.1 ViT-g/16 Optimized Benchmark Config
# Based on benchmark-vitg-8nodes.yaml with performance tuning for B200 GPUs.
#
# Changes from baseline:
#   - use_activation_checkpointing: false  (trades memory for speed)
#   - compile_model: true     (torch.compile for fused kernels — requires AC off)
#   - batch_size: 12  (effective 24/rank with rank_ratio=0.5; reduced from
#     baseline 24 (eff 48) to fit in 178 GB without AC — uses ~111 GB/GPU)
#   - num_workers: 16         (B200 has 192 CPUs = 24/GPU; 16 leaves headroom)
#
# IMPORTANT: V-JEPA 2.1 computes effective per-rank batch as:
#   batch_size * world_size / num_video_ranks
# With rank_ratio=0.5 and 64 GPUs: batch_size * 64 / 32 = batch_size * 2
#
# Note: compile_model MUST be under the `model:` section (not `meta:`)
# because the upstream train.py reads it from cfgs_model.
#
# Memory impact: ~100 GB/GPU vs ~53 GB/GPU with activation checkpointing.
# B200 GPUs have 178 GB HBM so this is well within limits.
#
# Before running, update the following paths:
#   - folder: output directory for logs and checkpoints
#   - datasets: paths to your training CSVs (synthetic or real)
#   - img_data.datasets: path to your image CSV (synthetic or ImageNet)
#
# Important: Generate at least 50,000 synthetic videos and 50,000 images for
# accurate benchmarks. Smaller datasets (e.g. 5,000) cause frequent data
# loader re-initialization which inflates iteration times by up to 4x and
# masks true GPU throughput.

app: vjepa_2_1
nodes: 8
tasks_per_node: 8
cpus_per_task: 16
mem_per_gpu: 220G
folder: /fsx/<your_username>/vjepa2.1/benchmark/optim_sweep

data:
  dataset_type: VideoDataset
  datasets:
    - /fsx/<your_username>/vjepa2.1/datasets/synthetic_50k/synthetic_train_paths.csv
  datasets_weights:
    - 1.0
  batch_size: 12
  crop_size: 256
  patch_size: 16
  dataset_fpcs:
    - 16
  tubelet_size: 2
  fps: 4
  num_workers: 16
  persistent_workers: true
  pin_mem: true

img_data:
  batch_size: 72
  crop_size: 256
  dataset_fpcs:
    - 1
  dataset_type: VideoDataset
  datasets:
    - /fsx/<your_username>/vjepa2.1/datasets/synthetic_images_50k/synthetic_image_paths.csv
  datasets_weights:
    - 1.0
  rank_ratio: 0.5

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 0.75
    - 1.35
  random_resize_scale:
    - 0.3
    - 1.0
  reprob: 0.0

loss:
  loss_exp: 1.0
  predict_all: true
  reg_coeff: 0.0
  shift_by_n: 0
  weight_distance_loss: true

mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 8
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 2
    spatial_scale:
      - 0.7
      - 0.7
    temporal_scale:
      - 1.0
      - 1.0

img_mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 10
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: -1
  seed: 239
  use_sdpa: true

model:
  compile_model: true
  has_cls_first: false
  img_temporal_dim_size: 1
  interpolate_rope: true
  is_causal: false
  lambda_value_img: 0.5
  lambda_value_vid: 0.5
  local_window:
    - -1
    - -1
    - -1
  modality_embedding: true
  model_name: vit_giant_xformers
  n_registers: 0
  n_registers_predictor: 0
  normalize_predictor: false
  pred_depth: 24
  pred_embed_dim: 384
  pred_is_causal: false
  pred_local_window:
    - -1
    - -1
    - -1
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: false
  use_mask_tokens: true
  use_rope: true
  vit_conv: false
  zero_init_mask_tokens: true

optimization:
  ema:
    - 0.99925
    - 0.99925
  epochs: 1
  final_lr: 0.0006
  final_weight_decay: 0.04
  ipe: 200
  ipe_scale: 1.25
  lr: 0.0006
  start_lr: 0.0001
  warmup: 10
  weight_decay: 0.04
