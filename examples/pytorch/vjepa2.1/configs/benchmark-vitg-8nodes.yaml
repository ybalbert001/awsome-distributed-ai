#
# V-JEPA 2.1 ViT-g/16 Benchmark Config
# Adapted from facebookresearch/vjepa2 configs/train_2_1/vitg16/pretrain-256px-16f.yaml
# Configured for 8-node (64 GPU) benchmark run on p5en.48xlarge (H200)
#
# V-JEPA 2.1 co-trains on images and video simultaneously.
# With rank_ratio=0.5, 32 GPUs process video (batch 24) and 32 GPUs process images (batch 72).
#
# Before running, update the following paths:
#   - folder: output directory for logs and checkpoints
#   - datasets: paths to your training CSVs (synthetic or real)
#   - img_data.datasets: path to your image CSV (synthetic or ImageNet)
#
# Important: Generate at least 50,000 synthetic videos and 50,000 images for
# accurate benchmarks. Smaller datasets (e.g. 5,000) cause frequent data
# loader re-initialization which inflates iteration times by up to 4x and
# masks true GPU throughput. This is especially important for V-JEPA 2.1
# where the rank_ratio=0.5 split means each rank processes only half the data.

app: vjepa_2_1
nodes: 8
tasks_per_node: 8
cpus_per_task: 16
mem_per_gpu: 220G
folder: /fsx/<your_username>/vjepa2.1/benchmark/8.8.vitg.256px.16f

data:
  dataset_type: VideoDataset
  datasets:
    - /fsx/<your_username>/vjepa2.1/datasets/synthetic/synthetic_train_paths.csv
  datasets_weights:
    - 1.0
  batch_size: 24
  crop_size: 256
  patch_size: 16
  dataset_fpcs:
    - 16
  tubelet_size: 2
  fps: 4
  num_workers: 8
  persistent_workers: true
  pin_mem: true

img_data:
  batch_size: 72
  crop_size: 256
  dataset_fpcs:
    - 1
  dataset_type: VideoDataset
  datasets:
    - /fsx/<your_username>/vjepa2.1/datasets/synthetic_images/synthetic_image_paths.csv
  datasets_weights:
    - 1.0
  rank_ratio: 0.5

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 0.75
    - 1.35
  random_resize_scale:
    - 0.3
    - 1.0
  reprob: 0.0

loss:
  loss_exp: 1.0
  predict_all: true
  reg_coeff: 0.0
  shift_by_n: 0
  weight_distance_loss: true

mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 8
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 2
    spatial_scale:
      - 0.7
      - 0.7
    temporal_scale:
      - 1.0
      - 1.0

img_mask:
  - aspect_ratio:
      - 0.75
      - 1.5
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 10
    spatial_scale:
      - 0.15
      - 0.15
    temporal_scale:
      - 1.0
      - 1.0

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: -1
  seed: 239
  use_sdpa: true

model:
  has_cls_first: false
  img_temporal_dim_size: 1
  interpolate_rope: true
  is_causal: false
  lambda_value_img: 0.5
  lambda_value_vid: 0.5
  local_window:
    - -1
    - -1
    - -1
  modality_embedding: true
  model_name: vit_giant_xformers
  n_registers: 0
  n_registers_predictor: 0
  normalize_predictor: false
  pred_depth: 24
  pred_embed_dim: 384
  pred_is_causal: false
  pred_local_window:
    - -1
    - -1
    - -1
  pred_num_heads: 12
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  vit_conv: false
  zero_init_mask_tokens: true

optimization:
  ema:
    - 0.99925
    - 0.99925
  epochs: 1
  final_lr: 0.0006
  final_weight_decay: 0.04
  ipe: 200
  ipe_scale: 1.25
  lr: 0.0006
  start_lr: 0.0001
  warmup: 10
  weight_decay: 0.04
